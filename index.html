<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>치즈 돌림판 - 프리미엄 3단 레이아웃</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <div class="theme-switch-wrapper">
        <button id="themeToggleBtn" class="theme-toggle-btn">☀️ 라이트 모드</button> 
    </div>

    <div class="main-layout">
        
        <div class="container">
            
            <div class="simulator-sidebar">
                <div class="sidebar-header">
                    <h3>⚙️ 시뮬레이터 패널</h3>
                    <div class="reroll-status-board">
                        <span>리롤 비용: <strong id="currentRerollCost">1,000</strong> 🧀</span>
                    </div>
                    <button id="resetRerollBtn" class="sim-mini-btn" tabindex="-1" onmousedown="event.preventDefault();">비용 초기화</button>
                </div>

                <div class="sidebar-section">
                    <h4>🎁 가상 후원 테스트</h4>
                    <p class="side-guide-text">우측 목록에서 항목을 선택한 후 누르면 가중치가 즉시 팽창합니다.</p>
                    <div class="vertical-buttons">
                        <button class="donation-btn d-1000" onmousedown="event.preventDefault();" onclick="simulateDonation(1000)">🧀 1,000 치즈 후원</button>
                        <button class="donation-btn d-5000" onmousedown="event.preventDefault();" onclick="simulateDonation(5000)">🧀 5,000 치즈 후원</button>
                        <button class="donation-btn d-10000" onmousedown="event.preventDefault();" onclick="simulateDonation(10000)">🧀 10,000 치즈 후원</button>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h4>🔄 리롤 및 수치 설정</h4>
                    <button id="simRerollBtn" class="donation-btn reroll-trigger">🔄 가상 리롤 실행</button>
                    
                    <div class="config-grid">
                        <div class="config-item">
                            <label>1가중치당 치즈</label>
                            <input type="number" id="cheesePerCount" value="1000" min="100" step="100">
                        </div>
                        <div class="config-item">
                            <label>리롤 기본 비용</label>
                            <input type="number" id="rerollBaseCost" value="1000" min="0" step="500">
                        </div>
                        <div class="config-item">
                            <label>리롤 회당 증가액</label>
                            <input type="number" id="rerollStepCost" value="500" min="0" step="100">
                        </div>
                    </div>
                </div>
            </div>

            <div class="roulette-section">
                <h2>행운의 돌림판</h2>
                <div class="roulette-wrapper">
                    <div class="arrow">▼</div>
                    <canvas id="rouletteCanvas"></canvas>
                    <button id="actionBtn">시작</button>

                    <div id="resultPopup" class="result-popup">
                        <div class="popup-content">
                            <div class="popup-title">🎉 추첨 완료 🎉</div>
                            <div id="popupResultText" class="popup-text">항목명</div>
                            <div id="popupSubText" class="popup-sub-text">화면 아무 곳이나 클릭하면 닫힙니다</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="control-panel">
                <ul id="itemList" class="item-list"></ul>
                
                <div id="addBtn" class="add-item-box">
                    <span class="add-icon">＋</span>
                    <span class="add-text">항목 추가</span>
                </div>
                
                <div id="inputMessage" class="input-message"></div>
            </div>

        </div>

        <div class="chzzk-connect-panel">
            <div class="chzzk-header">
                <h3>📡 실제 Chzzk 채널 실시간 연동 설정</h3>
                <span id="connectionStatus" class="status-badge disconnected">🔴 연결 끊김</span>
            </div>
            <div class="chzzk-body">
                <div class="chzzk-input-group">
                    <input type="text" id="chzzkChannelId" placeholder="치지직 채널 고유 ID를 입력하세요 (예: 28da9d8...)" autocomplete="off">
                    <button id="chzzkConnectBtn">방송 연동 시작</button>
                </div>
                <p class="chzzk-guide-text">💡 주소창의 <code>chzzk.naver.com/live/<b>[이부분의문자열]</b></code>이 고유 ID입니다. 연동 시 실제 시청자의 치즈 후원액에 따라 항목이 가변 팽창합니다.</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
